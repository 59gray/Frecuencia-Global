<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="fg-s-v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06080c" stop-opacity="0"/>
      <stop offset="42%" stop-color="#06080c" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#06080c" stop-opacity="1"/>
    </linearGradient>
    <pattern id="fg-s-hatch" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
