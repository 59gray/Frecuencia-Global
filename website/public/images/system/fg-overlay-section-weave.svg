  <path d="M0 360 L1400 300" stroke="url(#fg-s-diagonal)" stroke-width="1.25" opacity="0.7"/>
  <path d="M0 480 L1400 420" stroke="rgba(255,0,229,0.06)" stroke-width="1"/>
  <path d="M280 0 Q 520 300 720 420 T 1160 800" stroke="rgba(0,229,255,0.07)" stroke-width="1.2" fill="none"/>
  <rect width="1400" height="800" fill="url(#fg-s-v)"/>
