<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- fondo oscuro con radio -->
  <rect width="32" height="32" rx="7" fill="#0A0A0F"/>
  <!-- corchete izquierdo [ -->
  <path d="M8 7 L5 7 L5 25 L8 25" stroke="#00E5FF" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- corchete derecho ] -->
  <path d="M24 7 L27 7 L27 25 L24 25" stroke="#00E5FF" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- línea izquierda hasta círculo -->
  <line x1="5" y1="16" x2="12" y2="16" stroke="#00E5FF" stroke-width="2.4" stroke-linecap="round"/>
  <!-- línea derecha desde círculo -->
  <line x1="20" y1="16" x2="27" y2="16" stroke="#00E5FF" stroke-width="2.4" stroke-linecap="round"/>
  <!-- círculo central sólido -->
  <circle cx="16" cy="16" r="4" fill="#00E5FF"/>
</svg>
