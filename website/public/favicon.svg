<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- fondo oscuro con radio -->
  <rect width="32" height="32" rx="7" fill="#0A0A0F"/>
  <!-- arco exterior señal -->
  <path d="M6 16 A10 10 0 0 1 26 16" stroke="#00E5FF" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- arco interior señal -->
  <path d="M9.5 16 A6.5 6.5 0 0 1 22.5 16" stroke="#00E5FF" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>
  <!-- punto central -->
  <circle cx="16" cy="16" r="3" fill="#00E5FF"/>
  <!-- línea base horizontal -->
  <line x1="4" y1="20" x2="28" y2="20" stroke="#00E5FF" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>
</svg>
