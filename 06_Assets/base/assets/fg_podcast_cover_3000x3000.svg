<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="3000" viewBox="0 0 3000 3000" role="img" aria-labelledby="title desc">
  <title id="title">Frecuencia Global Podcast Cover Art</title>
  <desc id="desc">Show cover for Frecuencia Global Podcast with asymmetrical editorial typography, strategic signal node, and dark geopolitical-tech visual system.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06090F"/>
      <stop offset="45%" stop-color="#0A111B"/>
      <stop offset="100%" stop-color="#04070C"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="22%" cy="18%" r="52%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.28"/>
      <stop offset="45%" stop-color="#00E5FF" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowMagenta" cx="86%" cy="82%" r="42%">
      <stop offset="0%" stop-color="#FF3EBF" stop-opacity="0.2"/>
      <stop offset="45%" stop-color="#FF3EBF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF3EBF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowNode" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#00E5FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="signalLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00E5FF" stop-opacity="0.72"/>
      <stop offset="52%" stop-color="#A6FBFF" stop-opacity="1"/>
      <stop offset="84%" stop-color="#00E5FF" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
  </defs>

  <rect width="3000" height="3000" fill="url(#bg)"/>
  <rect width="3000" height="3000" fill="url(#glowCyan)"/>
  <rect width="3000" height="3000" fill="url(#glowMagenta)"/>

  <g opacity="0.12" stroke="#22374B" stroke-width="2">
    <line x1="0" y1="430" x2="3000" y2="430"/>
    <line x1="0" y1="790" x2="3000" y2="790"/>
    <line x1="0" y1="1150" x2="3000" y2="1150"/>
    <line x1="0" y1="1510" x2="3000" y2="1510"/>
    <line x1="0" y1="1870" x2="3000" y2="1870"/>
    <line x1="0" y1="2230" x2="3000" y2="2230"/>
    <line x1="0" y1="2590" x2="3000" y2="2590"/>
    <line x1="430" y1="0" x2="430" y2="3000"/>
    <line x1="790" y1="0" x2="790" y2="3000"/>
    <line x1="1150" y1="0" x2="1150" y2="3000"/>
    <line x1="1510" y1="0" x2="1510" y2="3000"/>
    <line x1="1870" y1="0" x2="1870" y2="3000"/>
    <line x1="2230" y1="0" x2="2230" y2="3000"/>
    <line x1="2590" y1="0" x2="2590" y2="3000"/>
  </g>

  <g opacity="0.18" stroke="#103042" stroke-width="5" fill="none">
    <path d="M0 1560 H3000"/>
    <path d="M1640 0 V3000"/>
    <path d="M2140 0 V3000"/>
  </g>

  <g transform="translate(240 250)">
    <rect x="0" y="0" width="1280" height="154" rx="77" fill="#0D1420" fill-opacity="0.96" stroke="#00E5FF" stroke-opacity="0.25" stroke-width="5"/>
    <text x="82" y="103" font-family="Impact, Arial Black, Arial, sans-serif" font-size="82" font-weight="700" letter-spacing="12" fill="#F4F7FB">
      FRECUENCIA GLOBAL
    </text>
  </g>

  <g transform="translate(2380 240)">
    <rect x="0" y="0" width="380" height="380" rx="52" fill="#0D1420" fill-opacity="0.95" stroke="#00E5FF" stroke-opacity="0.24" stroke-width="6"/>
    <path d="M92 98H58v184h34" stroke="#00E5FF" stroke-width="18" fill="none" stroke-linecap="round"/>
    <path d="M288 98h34v184h-34" stroke="#00E5FF" stroke-width="18" fill="none" stroke-linecap="round"/>
    <path d="M122 190H258" stroke="#00E5FF" stroke-width="18" fill="none" stroke-linecap="round"/>
    <circle cx="190" cy="190" r="36" fill="#00E5FF"/>
    <circle cx="190" cy="190" r="14" fill="#061017"/>
    <circle cx="190" cy="190" r="6" fill="#B8FF00"/>
  </g>

  <g transform="translate(1820 1500)">
    <g filter="url(#softBlur)">
      <circle cx="0" cy="0" r="350" fill="url(#glowNode)"/>
    </g>
    <circle cx="0" cy="0" r="720" fill="none" stroke="#22374B" stroke-width="4" stroke-opacity="0.45"/>
    <circle cx="0" cy="0" r="530" fill="none" stroke="#00E5FF" stroke-width="6" stroke-opacity="0.17"/>
    <circle cx="0" cy="0" r="390" fill="none" stroke="#00E5FF" stroke-width="8" stroke-opacity="0.22"/>
    <circle cx="0" cy="0" r="250" fill="none" stroke="#00E5FF" stroke-width="10" stroke-opacity="0.28"/>
    <path d="M-1450 0H950" stroke="url(#signalLine)" stroke-width="26" stroke-linecap="round"/>
    <path d="M0 -980V980" stroke="#103042" stroke-width="10" stroke-opacity="0.5"/>
    <path d="M-300 -610L0 -330L0 0" stroke="#22374B" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M300 610L0 330L0 0" stroke="#22374B" stroke-width="8" stroke-linecap="round" fill="none"/>
    <circle cx="0" cy="0" r="118" fill="#00E5FF"/>
    <circle cx="0" cy="0" r="50" fill="#061017"/>
    <circle cx="0" cy="0" r="16" fill="#B8FF00"/>
    <circle cx="-530" cy="0" r="30" fill="#FF3EBF"/>
    <circle cx="530" cy="0" r="30" fill="#FF3EBF"/>
    <circle cx="0" cy="-530" r="30" fill="#B8FF00"/>
    <circle cx="0" cy="530" r="30" fill="#B8FF00"/>
  </g>

  <g transform="translate(240 1030)">
    <text x="0" y="0" font-family="Impact, Arial Black, Arial, sans-serif" font-size="420" font-weight="900" letter-spacing="10" fill="#F4F7FB">
      PODCAST
    </text>
    <rect x="0" y="118" width="920" height="24" rx="12" fill="#00E5FF"/>
    <rect x="950" y="118" width="180" height="24" rx="12" fill="#FF3EBF"/>
    <text x="0" y="250" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700" letter-spacing="12" fill="#B8FF00">
      ANALISIS INTERNACIONAL
    </text>
    <text x="0" y="342" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700" letter-spacing="8" fill="#CBD6E4" opacity="0.94">
      CULTURA / TECNOLOGIA / GEOPOLITICA
    </text>
  </g>

  <g transform="translate(240 2490)">
    <rect x="0" y="0" width="2520" height="220" rx="40" fill="#0D1420" fill-opacity="0.96" stroke="#22374B" stroke-width="4"/>
    <text x="84" y="97" font-family="Arial, Helvetica, sans-serif" font-size="62" font-weight="700" letter-spacing="9" fill="#00E5FF">
      SISTEMA EDITORIAL DE SENAL
    </text>
    <text x="84" y="173" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="500" letter-spacing="5" fill="#F4F7FB">
      audio-first / web / videopodcast
    </text>
    <circle cx="2390" cy="110" r="18" fill="#B8FF00"/>
    <rect x="2324" y="145" width="110" height="8" rx="4" fill="#FF3EBF"/>
  </g>

  <g opacity="0.95" stroke="#00E5FF" stroke-width="24" stroke-linecap="round" fill="none">
    <path d="M240 540H700"/>
    <path d="M240 540V890H310"/>
    <path d="M2760 2020V2460H2690"/>
    <path d="M2300 2460H2760"/>
  </g>
</svg>
