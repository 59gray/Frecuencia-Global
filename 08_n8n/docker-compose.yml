# Frecuencia Global — n8n Orchestration Stack
# Docs: 08_n8n/README.md
# Uso: docker compose up -d

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:1.99.1
    container_name: fg_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-changeme}
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=${TZ:-America/Mexico_City}
      - N8N_METRICS=false
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678}
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - N8N_LOG_LEVEL=debug
    volumes:
      # Persistencia de n8n (DB SQLite, credenciales, settings)
      - n8n_data:/home/node/.n8n
      # Workspace FG montado como /workspace (read/write)
      - ../:/workspace
      # Workflows exportados (para import manual)
      - ./workflows:/workflows
    working_dir: /workspace
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  n8n_data:
    driver: local
